<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Tailoring Portal</title>
<style>
  :root{
    --ink:#2b2420;
    --ink-soft:#6b5f54;
    --hint:#a89a8b;
    --paper:#fbf7f1;
    --panel:#ffffff;
    --line:#e6dcce;
    --accent:#9c5b3c;
    --accent-deep:#6e3e29;
    --accent-tint:#f3e3d8;
    --good:#4d6b4a;
    --good-tint:#e8efe4;
    --pending:#a8762f;
    --pending-tint:#f6ecd9;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:32px 20px 60px;}
  .masthead{
    text-align:center;
    margin-bottom:28px;
    padding-bottom:20px;
    border-bottom:1px solid var(--line);
  }
  .masthead .label{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--accent);
    margin:0 0 6px;
  }
  .masthead h1{
    font-size:30px;
    font-weight:400;
    margin:0;
    letter-spacing:0.01em;
  }
  .masthead p{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:13px;
    color:var(--ink-soft);
    margin:8px 0 0;
  }
  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:24px;
    margin-bottom:20px;
  }
  .panel-title{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:12px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin:0 0 16px;
  }
  .name-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:10px;
  }
  .name-btn{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:14px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 10px;
    cursor:pointer;
    text-align:center;
    color:var(--ink);
    transition:border-color .15s, background .15s;
  }
  .name-btn:hover{border-color:var(--accent);background:var(--accent-tint);}
  .name-btn .status-dot{
    display:inline-block;
    width:7px;height:7px;
    border-radius:50%;
    margin-right:6px;
    vertical-align:1px;
  }
  .dot-submitted{background:var(--good);}
  .dot-pending{background:var(--pending);}
  .add-row{
    display:flex;
    gap:8px;
    margin-top:14px;
    padding-top:14px;
    border-top:1px dashed var(--line);
  }
  input[type=text], textarea, input[type=number]{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:14px;
    border:1px solid var(--line);
    border-radius:8px;
    padding:9px 11px;
    background:var(--paper);
    color:var(--ink);
    width:100%;
  }
  input[type=text]:focus, textarea:focus, input[type=number]:focus{
    outline:none;
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-tint);
  }
  button.primary{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:13px;
    font-weight:500;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:8px;
    padding:10px 16px;
    cursor:pointer;
    white-space:nowrap;
  }
  button.primary:hover{background:var(--accent-deep);}
  button.ghost{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:12px;
    background:transparent;
    color:var(--ink-soft);
    border:1px solid var(--line);
    border-radius:8px;
    padding:8px 12px;
    cursor:pointer;
  }
  button.ghost:hover{border-color:var(--accent);color:var(--accent);}
  .profile-header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:18px;
  }
  .profile-header h2{
    font-size:24px;
    font-weight:400;
    margin:0;
  }
  .back{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:12px;
    color:var(--ink-soft);
    cursor:pointer;
    border:none;
    background:none;
    padding:0;
    margin-bottom:16px;
  }
  .back:hover{color:var(--accent);}
  .design-box{
    background:var(--accent-tint);
    border-radius:10px;
    padding:14px 16px;
    margin-bottom:20px;
  }
  .design-box .k{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--accent-deep);
    margin:0 0 4px;
  }
  .design-box .v{
    font-size:16px;
    margin:0;
    line-height:1.5;
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:5px;
  }
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .overlay-help{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:12px;
    color:var(--ink-soft);
    margin:0 0 14px;
  }
  .chart-overlay-wrap{
    position:relative;
    width:100%;
    margin-bottom:20px;
    border-radius:10px;
    overflow:hidden;
    border:1px solid var(--line);
  }
  .chart-bg{
    display:block;
    width:100%;
    height:auto;
  }
  .overlay-input{
    position:absolute;
    height:3.2%;
    min-height:18px;
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:clamp(9px, 1.6vw, 13px);
    background:rgba(255,255,255,0.001);
    border:none;
    border-bottom:1.5px solid transparent;
    padding:0 2px;
    color:#16213d;
    border-radius:0;
  }
  .overlay-input:hover{
    background:rgba(156,91,60,0.06);
  }
  .overlay-input:focus{
    outline:none;
    background:#fff;
    border-bottom:1.5px solid var(--accent);
    box-shadow:0 1px 0 0 var(--accent);
  }
  .overlay-input.invalid{
    border-bottom:1.5px solid #c0524f;
    background:rgba(192,82,79,0.08);
  }
  .unit-input{display:flex;align-items:center;gap:8px;}
  .unit-input span{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:12px;
    color:var(--hint);
    white-space:nowrap;
  }
  .status-line{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:12px;
    padding:8px 12px;
    border-radius:8px;
    margin-bottom:18px;
    display:inline-block;
  }
  .status-submitted{background:var(--good-tint);color:var(--good);}
  .status-pending{background:var(--pending-tint);color:var(--pending);}
  .save-row{
    display:flex;
    align-items:center;
    gap:14px;
    margin-top:18px;
  }
  .saved-msg{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:12px;
    color:var(--good);
    opacity:0;
    transition:opacity .3s;
  }
  .saved-msg.show{opacity:1;}
  .admin-table{width:100%;border-collapse:collapse;font-family:'Helvetica Neue',Arial,sans-serif;font-size:13px;}
  .admin-table th{
    text-align:left;
    font-size:11px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
    padding:8px 10px;
    border-bottom:1px solid var(--line);
  }
  .admin-table td{
    padding:10px 10px;
    border-bottom:1px solid var(--line);
    vertical-align:top;
  }
  .pill{
    display:inline-block;
    font-size:11px;
    padding:3px 9px;
    border-radius:20px;
  }
  .pill-submitted{background:var(--good-tint);color:var(--good);}
  .pill-pending{background:var(--pending-tint);color:var(--pending);}
  .toggle-admin{
    text-align:center;
    margin-top:8px;
  }
  .toggle-admin button{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:11px;
    color:var(--hint);
    background:none;
    border:none;
    cursor:pointer;
    text-decoration:underline;
  }
  .empty{
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:13px;
    color:var(--hint);
    text-align:center;
    padding:20px;
  }
  .loading{
    text-align:center;
    padding:40px;
    font-family:'Helvetica Neue',Arial,sans-serif;
    font-size:13px;
    color:var(--hint);
  }
  @media (max-width:480px){
    .field-row{grid-template-columns:1fr;}
  }
</style>
</head>

// ── App state ──────────────────────────────────────────────────────────────
let guests = [];
let submissions = {};
let currentView = { type: 'list' };

async function loadAll(){
  try{
    const g = await window.storage.get('guest-list', true);
    guests = g ? JSON.parse(g.value) : SEED_GUESTS;
  }catch(e){
    guests = SEED_GUESTS;
  }
  try{
    const s = await window.storage.get('submissions', true);
    submissions = s ? JSON.parse(s.value) : {};
  }catch(e){
    submissions = {};
  }
  render();
}

async function saveGuests(){
  try{
    await window.storage.set('guest-list', JSON.stringify(guests), true);
  }catch(e){
    console.error('Could not save guest list', e);
  }
}

async function saveSubmissions(){
  try{
    await window.storage.set('submissions', JSON.stringify(submissions), true);
  }catch(e){
    console.error('Could not save submissions', e);
  }
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function formatDate(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' }) +
    ' at ' + d.toLocaleTimeString(undefined, { hour:'numeric', minute:'2-digit' });
}

function render(){
  if(currentView.type === 'list') renderList();
  else if(currentView.type === 'profile') renderProfile(currentView.guestId);
  else if(currentView.type === 'admin') renderAdmin();
}

function renderList(){
  const app = document.getElementById('app');
  const rows = guests.map(g => {
    const sub = submissions[g.id];
    const dotClass = sub ? 'dot-submitted' : 'dot-pending';
    return `<button class="name-btn" data-action="open" data-id="${g.id}">
      <span class="status-dot ${dotClass}"></span>${escapeHtml(g.name)}
    </button>`;
  }).join('');

  app.innerHTML = `
    <div class="masthead">
      <p class="label">Tailoring portal</p>
      <h1>Find your name</h1>
      <p>Tap your name to see your design and enter your measurements</p>
    </div>
    <div class="panel">
      <p class="panel-title">Guests</p>
      <div class="name-grid">${rows || '<p class="empty">No guests yet — add one below</p>'}</div>
      <div class="add-row">
        <input type="text" id="new-name" placeholder="Guest name">
        <button class="primary" data-action="add-guest">Add</button>
      </div>
    </div>
    <div class="toggle-admin">
      <button data-action="show-admin">View all submissions</button>
    </div>
  `;

  app.querySelectorAll('[data-action="open"]').forEach(btn => {
    btn.addEventListener('click', () => {
      currentView = { type: 'profile', guestId: btn.dataset.id };
      render();
    });
  });
  app.querySelector('[data-action="add-guest"]').addEventListener('click', addGuest);
  app.querySelector('#new-name').addEventListener('keydown', e => {
    if(e.key === 'Enter') addGuest();
  });
  app.querySelector('[data-action="show-admin"]').addEventListener('click', () => {
    currentView = { type: 'admin' };
    render();
  });
}

function addGuest(){
  const input = document.getElementById('new-name');
  const name = input.value.trim();
  if(!name) return;
  const id = 'guest_' + Date.now();
  guests.push({ id, name, design: '' });
  saveGuests();
  render();
}

function renderProfile(guestId){
  const guest = guests.find(g => g.id === guestId);
  const app = document.getElementById('app');
  if(!guest){ currentView = { type: 'list' }; render(); return; }

  const sub = submissions[guestId];
  const statusHtml = sub
    ? sub.complete
      ? `<div class="status-line status-submitted">All measurements submitted ${formatDate(sub.submittedAt)}</div>`
      : `<div class="status-line status-pending">Partially saved ${formatDate(sub.submittedAt)} — some fields still missing</div>`
    : `<div class="status-line status-pending">Measurements not yet submitted</div>`;

  const useMens = isMensChart(guest.name);
  const activeFields = useMens ? MENS_MEASUREMENT_FIELDS : MEASUREMENT_FIELDS;
  const activeImage = useMens ? MENS_CHART_IMAGE_B64 : CHART_IMAGE_B64;

  const overlayInputsHtml = activeFields.map(f => {
    const val = sub && sub.values && sub.values[f.key] != null ? sub.values[f.key] : '';
    const inputType = f.isText ? 'text' : 'number';
    const step = f.isText ? '' : 'step="0.1" min="0"';
    const labelHtml = f.key === 'neck_to_nipple'
      ? `<span style="position:absolute;top:${f.top - 3.5}%;left:${f.left}%;font-family:'Helvetica Neue',Arial,sans-serif;font-size:clamp(8px,1.4vw,11px);color:#2b2420;font-weight:600;">Neck to nipple (cm)</span>`
      : '';
    return `${labelHtml}<input
      type="${inputType}" ${step}
      class="overlay-input"
      data-key="${f.key}"
      id="m-${f.key}"
      value="${escapeHtml(String(val))}"
      style="top:${f.top}%; left:${f.left}%; width:${f.width}%;"
      aria-label="${escapeHtml(f.label)}">`;
  }).join('');

  app.innerHTML = `
    <div class="wrap-inner">
      <button class="back" data-action="back">&larr; Back to guest list</button>
      <div class="panel">
        <div class="profile-header">
          <h2>${escapeHtml(guest.name)}</h2>
        </div>
        <div class="design-box">
          <p class="k">Your design</p>
          ${(guest.designImages && guest.designImages.length > 0)
            ? guest.designImages.map((src, i) => `<img src="${escapeHtml(src)}" alt="Design ${i+1} for ${escapeHtml(guest.name)}" style="width:100%;max-width:380px;border-radius:8px;display:block;margin:8px 0;">`).join('')
            : guest.designImage
              ? `<img src="${escapeHtml(guest.designImage)}" alt="Design for ${escapeHtml(guest.name)}" style="width:100%;max-width:380px;border-radius:8px;display:block;margin:8px 0;">`
              : `<p class="v"><span style="color:var(--hint)">Design coming soon</span></p>`}
          ${guest.design ? `<p class="v" style="margin-top:8px;">${escapeHtml(guest.design)}</p>` : ''}
        </div>
        <button class="ghost" data-action="edit-design" style="margin-bottom:20px;">Edit design note</button>

        ${statusHtml}

        <p class="panel-title" style="margin-top:6px;">Measurements</p>
        <p class="overlay-help">Fill in every blank line on the chart below. All fields are required. <strong>All measurements must be in centimetres (cm).</strong></p>
        <div class="chart-overlay-wrap">
          <img src="data:image/png;base64,${activeImage}" alt="Body measurement chart with numbered blank lines" class="chart-bg">
          ${overlayInputsHtml}
        </div>

        <div class="field">
          <label>Notes for the tailor (fit preferences, etc.)</label>
          <textarea id="m-notes" rows="3">${sub && sub.notes ? escapeHtml(sub.notes) : ''}</textarea>
        </div>

        <div class="save-row">
          <button class="primary" data-action="save-measurements">Save measurements</button>
          <span class="saved-msg" id="saved-msg">Saved</span>
        </div>
      </div>
    </div>
  `;

  app.querySelector('[data-action="back"]').addEventListener('click', () => {
    currentView = { type: 'list' };
    render();
  });
  app.querySelector('[data-action="edit-design"]').addEventListener('click', () => editDesign(guestId));
  app.querySelector('[data-action="save-measurements"]').addEventListener('click', () => saveMeasurements(guestId));
}

function editDesign(guestId){
  const guest = guests.find(g => g.id === guestId);
  const next = prompt('Describe the requested design for ' + guest.name + ':', guest.design || '');
  if(next === null) return;
  guest.design = next.trim();
  saveGuests();
  render();
}

async function saveMeasurements(guestId){
  const guest = guests.find(g => g.id === guestId);
  const activeFields = isMensChart(guest.name) ? MENS_MEASUREMENT_FIELDS : MEASUREMENT_FIELDS;

  const values = {};
  let emptyCount = 0;

  activeFields.forEach(f => {
    const el = document.getElementById('m-' + f.key);
    const v = el.value.trim();
    if(v === ''){
      el.classList.add('invalid');
      emptyCount++;
    } else {
      el.classList.remove('invalid');
      values[f.key] = f.isText ? v : parseFloat(v);
    }
  });

  const notes = document.getElementById('m-notes').value.trim();
  const isComplete = emptyCount === 0;

  submissions[guestId] = {
    values,
    notes,
    complete: isComplete,
    submittedAt: new Date().toISOString()
  };

  await saveSubmissions();

  // ── Formspree email notification (only on complete submission) ─────────────
  if(isComplete){
    try {
      const measurementLines = Object.entries(values)
        .map(([k, v]) => `${k}: ${v}`)
        .join('\n');
      await fetch(FORMSPREE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: guest.name,
          chart: isMensChart(guest.name) ? 'Mens chart' : 'Womens chart',
          measurements: measurementLines,
          notes: notes || 'None'
        })
      });
    } catch(err) {
      console.warn('Formspree notification failed:', err);
    }
  }

  renderProfile(guestId);
  const msg = document.getElementById('saved-msg');
  if(msg){
    msg.textContent = isComplete
      ? 'Saved ✓'
      : `Saved — ${emptyCount} field${emptyCount > 1 ? 's' : ''} still missing`;
    msg.style.color = isComplete ? 'var(--good)' : 'var(--pending)';
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 3500);
  }
}

function renderAdmin(){
  const app = document.getElementById('app');
  const rows = guests.map(g => {
    const sub = submissions[g.id];
    const pillClass = sub ? (sub.complete ? 'pill-submitted' : 'pill-pending') : 'pill-pending';
    const pillText = sub ? (sub.complete ? 'Complete' : 'Partial') : 'Pending';
    const lastUpdated = sub ? formatDate(sub.submittedAt) : '—';
    const fieldSet = isMensChart(g.name) ? MENS_MEASUREMENT_FIELDS : MEASUREMENT_FIELDS;
    const measureCount = sub ? Object.keys(sub.values || {}).length : 0;
    return `<tr>
      <td>${escapeHtml(g.name)}</td>
      <td>${g.design ? escapeHtml(g.design) : '<span style="color:var(--hint)">—</span>'}</td>
      <td><span class="pill ${pillClass}">${pillText}</span></td>
      <td>${measureCount}/${fieldSet.length} fields</td>
      <td>${lastUpdated}</td>
    </tr>`;
  }).join('');

  app.innerHTML = `
    <div class="masthead">
      <p class="label">Tailoring portal</p>
      <h1>All submissions</h1>
      <p>Overview of every guest's status</p>
    </div>
    <div class="panel">
      <table class="admin-table">
        <thead>
          <tr><th>Name</th><th>Design</th><th>Status</th><th>Measurements</th><th>Last updated</th></tr>
        </thead>
        <tbody>${rows || '<tr><td colspan="5" class="empty">No guests yet</td></tr>'}</tbody>
      </table>
    </div>
    <div class="toggle-admin">
      <button data-action="back-list">Back to guest list</button>
    </div>
  `;

  app.querySelector('[data-action="back-list"]').addEventListener('click', () => {
    currentView = { type: 'list' };
    render();
  });
}

loadAll();
</script>
</body>
</html>
